services:
  transcriber:
    build: .
    image: transcriber
    volumes:
      - .:/data
    entrypoint: ["python", "/app/main.py"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  highlight-picker:
    build:
      context: .
      dockerfile: Dockerfile.highlight
    image: highlight-picker
    volumes:
      - .:/data
    environment:
      - HIGHLIGHT_API_URL=http://model-runner.docker.internal/engines/llama.cpp/v1/chat/completions
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint: ["python", "/app/highlight_picker.py"]
